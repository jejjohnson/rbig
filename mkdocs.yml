site_name: rbig
site_description: "Rotation-Based Iterative Gaussianization — density estimation, IT measures, and generative modeling"
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/rbig
repo_name: jejjohnson/rbig

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true
      include: ["*.ipynb"]
      ignore: ["*.py"]

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ['.']
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/custom.css

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Estimator Suite:
      - Overview: estimators.md
      - Outlier Detection: notebooks/19_outlier_detection.ipynb
      - Negentropy Reduction: notebooks/20_negentropy_reduction.ipynb
      - MI Feature Selection: notebooks/21_mi_feature_selection.ipynb
      - Gaussianize-then-Cluster: notebooks/22_gaussianize_then_cluster.ipynb
      - Nonlinear Bayes Classifier: notebooks/23_bayes_classifier.ipynb
      - Fairness Transform: notebooks/24_fairness_transform.ipynb
      - Residual Diagnostics: notebooks/25_residual_diagnostics.ipynb
  - Guides:
      - Choosing a Marginal: guides/choosing_a_marginal.md
      - Fairness API: guides/fairness.md
  - Benchmarks: benchmarks.md
  - Notes:
      - Algorithm:
          - RBIG Walk-Through: notebooks/03_rbig_walkthrough.ipynb
          - RBIG Demo: notebooks/04_rbig_demo.ipynb
          - RBIG Loss & Convergence: notebooks/05_rbig_loss.ipynb
      - Components:
          - Marginal Transforms: notebooks/01_marginal_transforms.ipynb
          - Boundary Issues: notebooks/07_boundary_issues.ipynb
          - Rotation Choices: notebooks/08_rotation_choices.ipynb
          - Image Rotations: notebooks/12_image_rotations.ipynb
          - Dimensionality Reduction: notebooks/13_dimensionality_reduction.ipynb
      - Information Theory:
          - Measures: notebooks/06_information_theory.ipynb
          - "Dependence: 1D": notebooks/09_dependence_1d.ipynb
          - "Dependence: 2D": notebooks/10_dependence_2d.ipynb
          - Real-World IT: notebooks/11_real_world_it.ipynb
      - Sliced Gaussianization:
          - Theory — RBIG vs SIG/GIS: notes/sliced_iterative_gaussianization.md
          - GIS Demo: notebooks/14_sliced_gaussianization.ipynb
          - SIG vs RBIG Convergence: notebooks/15_sig_vs_rbig_convergence.ipynb
          - Density Estimation Quality: notebooks/16_gis_density_estimation.ipynb
          - Sampling Quality: notebooks/17_sig_sampling_quality.ipynb
          - Boundary Behavior: notebooks/18_sig_boundary_behavior.ipynb
      - Foundations:
          - Density Estimation: notes/density_estimation.md
          - Gaussian Distribution: notes/gaussian_distribution.md
      - Context:
          - Related Methods: notes/related_methods.md
          - Literature Review: notes/literature.md
  - API Reference: api/reference.md
  - Changelog: CHANGELOG.md
