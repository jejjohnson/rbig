site_name: rbig
site_description: "Rotation-Based Iterative Gaussianization — density estimation, IT measures, and generative modeling"
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/rbig
repo_name: jejjohnson/rbig

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true
      include: ["*.ipynb"]
      ignore: ["*.py"]

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Notes:
      - RBIG Algorithm: notes/rbig.md
      - Marginal Gaussianization: notes/marginal_gaussianization.md
      - Uniformization: notes/uniformization.md
      - Rotation: notes/rotation.md
      - Related Methods: notes/related_methods.md
      - Information Theory Measures: notes/information_theory_measures.md
      - Density Estimation: notes/density_estimation.md
      - Gaussian Distribution: notes/gaussian_distribution.md
      - Literature Review: notes/literature.md
  - Notebooks:
      - Marginal Uniformization: notebooks/01_marginal_uniformization.ipynb
      - Marginal Gaussianization: notebooks/02_marginal_gaussianization.ipynb
      - RBIG Walk-Through: notebooks/03_rbig_walkthrough.ipynb
      - RBIG Demo: notebooks/04_rbig_demo.ipynb
      - RBIG Loss & Convergence: notebooks/05_rbig_loss.ipynb
      - Information Theory: notebooks/06_information_theory.ipynb
      - Boundary Issues: notebooks/07_boundary_issues.ipynb
      - Rotation Choices: notebooks/08_rotation_choices.ipynb
      - "Dependence: 1D": notebooks/09_dependence_1d.ipynb
      - "Dependence: 2D": notebooks/10_dependence_2d.ipynb
      - Real-World IT: notebooks/11_real_world_it.ipynb
  - API Reference: api/reference.md
  - Literature: notes/literature.md
  - Changelog: CHANGELOG.md
