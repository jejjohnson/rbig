name: Run Tests
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Run Tests (${{ matrix.os }}, 3.13)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: true
    steps:
      - name: Check out the code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Package
        run: uv sync --extra test

      - name: Run Tests
        run: uv run pytest tests/ -v --cov=./rbig --cov-report=xml:./coverage.xml

      - name: Upload code coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          name: rbig
          flags: unittests
          env_vars: OS,PYTHON
